name: SwiftyCape
options:
  bundleIdPrefix: com.capeify
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  SwiftyCape:
    type: application
    platform: macOS
    sources:
      - Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.capeify.ui
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/CapeifyUI.entitlements
        GENERATE_INFOPLIST_FILE: false
        PRODUCT_NAME: SwiftyCape
    postBuildScripts:
      - name: Copy CapeifyCLI
        script: |
          cp /Users/ghernagon/Developer/cursors/capeify/dist/CapeifyCLI "$BUILT_PRODUCTS_DIR/$PRODUCT_NAME.app/Contents/MacOS/"
